<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขสินค้า | ร้านตรายางออนไลน์</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS เหมือนเดิมทั้งหมด */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #667eea;
            font-size: 1rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .current-image {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
        }

        .current-image h3 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .image-preview {
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .image-preview:hover {
            transform: scale(1.05);
        }

        .file-upload {
            position: relative;
            margin-top: 10px;
        }

        .file-upload input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 500;
        }

        .file-upload-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .price-info {
            background: linear-gradient(135deg, #667eea10, #764ba210);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }

        .price-info p {
            margin: 5px 0;
            color: #555;
        }

        .price-info strong {
            color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-save {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #f44336, #e53935);
            color: white;
        }

        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(244, 67, 54, 0.3);
        }

        .message {
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: flex;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: flex;
        }

        .message.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            display: flex;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .loading i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        small {
            color: #888;
            font-size: 0.85rem;
            display: block;
            margin-top: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .modal .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal .close:hover {
            color: #667eea;
        }

        @media (max-width: 768px) {
            .container {
                border-radius: 20px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .content {
                padding: 20px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-edit"></i> แก้ไขสินค้า</h1>
            <p>แก้ไขข้อมูลสินค้าในร้านค้า</p>
        </div>
        
        <div class="content">
            <div id="message" class="message"></div>
            
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>กำลังโหลดข้อมูล...</p>
            </div>
            
            <form id="edit-product-form" style="display: none;">
                <input type="hidden" id="product_id" name="product_id">
                
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> ชื่อสินค้า *</label>
                    <input type="text" id="product_name" name="product_name" 
                           placeholder="กรุณากรอกชื่อสินค้า" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-list"></i> ประเภทตรายาง *</label>
                    <select id="product_category" name="product_category" required>
                        <option value="">เลือกประเภท</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-shape"></i> รูปร่างตรายาง *</label>
                    <select id="product_shape" name="product_shape" required>
                        <option value="">เลือกรูปร่าง</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-ruler"></i> ขนาดตรายาง *</label>
                    <input type="text" id="product_size" name="product_size" 
                           placeholder="เช่น: 3x5 ซม., 4x6 ซม." required>
                    <small>รูปแบบ: กว้างxยาว ซม. (เช่น 3x5 ซม.)</small>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-coins"></i> ราคา (บาท) *</label>
                    <input type="number" id="product_price" name="product_price" 
                           placeholder="กรอกราคาสินค้า" required min="0" step="0.01">
                    <small>ราคาขายจริง (อาจแตกต่างจากราคาคำนวณ)</small>
                    
                    <div id="price-info" class="price-info" style="display: none;"></div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-boxes"></i> จำนวนในคลัง *</label>
                    <input type="number" id="product_stock" name="product_stock" 
                           placeholder="กรอกจำนวนสินค้า" required min="0">
                </div>
                
                <div id="current-image-container" class="current-image" style="display: none;">
                    <h3><i class="fas fa-image"></i> รูปภาพปัจจุบัน</h3>
                    <p id="current-image-filename" style="color: #666; margin-bottom: 10px;"></p>
                    <img id="current-image" src="" alt="Current product image" 
                         class="image-preview" onclick="previewImage(this.src)">
                    <p style="margin-top: 10px; color: #888;">
                        <i class="fas fa-info-circle"></i> รูปภาพจาก GitHub repository
                    </p>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-upload"></i> เปลี่ยนรูปภาพ</label>
                    <div class="file-upload">
                        <input type="file" id="product-image" accept="image/*">
                        <div class="file-upload-label">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span id="file-name">เลือกรูปภาพใหม่...</span>
                        </div>
                    </div>
                    <small>ปล่อยว่างไว้หากไม่ต้องการเปลี่ยนรูปภาพ</small>
                    <img id="image-preview" style="display:none; max-width:200px; margin-top:15px; border-radius:10px; cursor:pointer;"
                         onclick="previewImage(this.src)">
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-save">
                        <i class="fas fa-save"></i> บันทึกการเปลี่ยนแปลง
                    </button>
                    <button type="button" class="btn btn-cancel" onclick="goBack()">
                        <i class="fas fa-times"></i> ยกเลิก
                    </button>
                </div>
            </form>
            
            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> กลับไปหน้าร้านค้า
                </a>
            </div>
        </div>
    </div>
    
    <!-- Modal for image preview -->
    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImage">
    </div>

    <script>
        // ==================== ตัวแปร Global ====================
        const SUPABASE_URL = 'https://whwuvqftcxmiyodnwmqe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indod3V2cWZ0Y3htaXlvZG53bXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE2MjY4NjEsImV4cCI6MjA1NzIwMjg2MX0.jCzN2Kz5B62hCCHmQ-5uUXMgD-pUy6dX0VOH7R8mlHU';
        
        let priceRate = 2.5;
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let usingSampleData = false;
        let sampleProducts = [];

        // ==================== ฟังก์ชันเรียก API ====================
        async function supabaseRequest(endpoint, options = {}) {
            const { method = 'GET', data = null, params = {} } = options;
            
            const queryParams = new URLSearchParams();
            Object.keys(params).forEach(key => {
                queryParams.append(key, params[key]);
            });
            
            const url = `${SUPABASE_URL}/rest/v1/${endpoint}${queryParams.toString() ? '?' + queryParams.toString() : ''}`;
            
            const headers = {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            };
            
            try {
                const response = await fetch(url, {
                    method,
                    headers,
                    body: data ? JSON.stringify(data) : undefined
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                if (method === 'PATCH' && response.status === 204) {
                    return { success: true };
                }
                
                return await response.json();
            } catch (error) {
                console.error('Supabase API error:', error);
                throw error;
            }
        }

        async function getCategories() {
            return supabaseRequest('products_role', {
                params: {
                    select: '*',
                    order: 'prod_role_name.asc'
                }
            });
        }

        async function getShapes() {
            return supabaseRequest('shapes', {
                params: {
                    select: '*',
                    order: 'shape_name.asc'
                }
            });
        }

        async function getPriceRate() {
            try {
                const settings = await supabaseRequest('settings', {
                    params: {
                        select: '*',
                        setting_key: 'eq.price_rate'
                    }
                });
                
                if (settings && settings.length > 0) {
                    priceRate = parseFloat(settings[0].setting_value);
                }
            } catch (error) {
                console.log('Using default price rate:', priceRate);
            }
            return priceRate;
        }

        async function getProductById(id) {
            const products = await supabaseRequest('products', {
                params: {
                    select: '*, products_role(*), shapes(*)',
                    products_id: `eq.${id}`
                }
            });
            
            return products.length > 0 ? products[0] : null;
        }

        async function updateProduct(id, data) {
            return supabaseRequest('products', {
                method: 'PATCH',
                params: { products_id: `eq.${id}` },
                data
            });
        }

        // ==================== ข้อมูลตัวอย่าง ====================
        function getSampleCategories() {
            return [
                { prod_role_id: 1, prod_role_name: 'ตรายางด่วน' },
                { prod_role_id: 2, prod_role_name: 'ตรายางบริษัท' },
                { prod_role_id: 3, prod_role_name: 'ตรายางชื่อบุคคล' },
                { prod_role_id: 4, prod_role_name: 'ตรายางวันที่' },
                { prod_role_id: 5, prod_role_name: 'ตรายางตัวเลข' }
            ];
        }

        function getSampleShapes() {
            return [
                { shape_id: 1, shape_name: 'สี่เหลี่ยม' },
                { shape_id: 2, shape_name: 'สี่เหลี่ยมมน' },
                { shape_id: 3, shape_name: 'วงกลม' },
                { shape_id: 4, shape_name: 'วงรี' },
                { shape_id: 5, shape_name: 'สามเหลี่ยม' }
            ];
        }

        function getSampleProducts() {
            return [
                {
                    products_id: 1,
                    products_name: 'ตรายางด่วน "รับทราบ"',
                    size: '3x5 ซม.',
                    products_price: 120.00,
                    prod_role_id: 1,
                    shape_id: 1,
                    products_role: { prod_role_name: 'ตรายางด่วน' },
                    shapes: { shape_name: 'สี่เหลี่ยม' },
                    prod_img: 'stamp1.png',
                    prod_stock: 50
                },
                {
                    products_id: 2,
                    products_name: 'ตรายางบริษัท ABC จำกัด',
                    size: '4x7 ซม.',
                    products_price: 350.00,
                    prod_role_id: 2,
                    shape_id: 1,
                    products_role: { prod_role_name: 'ตรายางบริษัท' },
                    shapes: { shape_name: 'สี่เหลี่ยม' },
                    prod_img: 'stamp2.png',
                    prod_stock: 20
                },
                {
                    products_id: 3,
                    products_name: 'ตรายางชื่อ-นามสกุล',
                    size: '2x6 ซม.',
                    products_price: 180.00,
                    prod_role_id: 3,
                    shape_id: 2,
                    products_role: { prod_role_name: 'ตรายางชื่อบุคคล' },
                    shapes: { shape_name: 'สี่เหลี่ยมมน' },
                    prod_img: 'stamp3.png',
                    prod_stock: 30
                },
                {
                    products_id: 4,
                    products_name: 'ตรายางวันที่หมุนได้',
                    size: '2x4 ซม.',
                    products_price: 280.00,
                    prod_role_id: 4,
                    shape_id: 1,
                    products_role: { prod_role_name: 'ตรายางวันที่' },
                    shapes: { shape_name: 'สี่เหลี่ยม' },
                    prod_img: 'stamp4.png',
                    prod_stock: 35
                },
                {
                    products_id: 5,
                    products_name: 'ตรายางตัวเลข 0-9',
                    size: '3x10 ซม.',
                    products_price: 280.00,
                    prod_role_id: 5,
                    shape_id: 1,
                    products_role: { prod_role_name: 'ตรายางตัวเลข' },
                    shapes: { shape_name: 'สี่เหลี่ยม' },
                    prod_img: 'stamp5.png',
                    prod_stock: 25
                }
            ];
        }

        function getSampleProductById(id) {
            const products = getSampleProducts();
            return products.find(p => p.products_id === parseInt(id)) || null;
        }

        // ==================== ฟังก์ชันช่วยเหลือ ====================
        function getImageUrl(imageName) {
            if (!imageName) {
                return 'https://via.placeholder.com/300x200/667eea/ffffff?text=No+Image';
            }
            
            if (imageName.startsWith('http')) {
                return imageName;
            }
            
            const githubBase = 'https://raw.githubusercontent.com/PEAW1026/Traiyang_Shop/main/image/';
            let filename = imageName;
            if (imageName.includes('/')) {
                filename = imageName.split('/').pop();
            }
            
            return githubBase + encodeURIComponent(filename);
        }

        function calculatePrice(width, length, customRate = null) {
            const rate = customRate !== null ? customRate : priceRate;
            const area = parseFloat(width) * parseFloat(length);
            return area * rate;
        }

        function parseSize(sizeString) {
            let width = 0;
            let length = 0;
            
            if (!sizeString) return { width, length };
            
            const match = sizeString.match(/(\d+(?:\.\d+)?)\s*[xX]\s*(\d+(?:\.\d+)?)/);
            if (match) {
                width = parseFloat(match[1]);
                length = parseFloat(match[2]);
            }
            
            return { width, length };
        }

        // ==================== ฟังก์ชันแสดงผล ====================
        function showMessage(text, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'flex';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function updatePriceInfo(size) {
            const sizeData = parseSize(size);
            const width = sizeData.width;
            const length = sizeData.length;
            
            if (width > 0 && length > 0) {
                const area = width * length;
                const calculatedPrice = calculatePrice(width, length, priceRate);
                
                document.getElementById('price-info').style.display = 'block';
                document.getElementById('price-info').innerHTML = `
                    <p><i class="fas fa-calculator"></i> <strong>การคำนวณราคา:</strong></p>
                    <p>📏 กว้าง: ${width} ซม. x ยาว: ${length} ซม. = พื้นที่ ${area.toFixed(2)} ตร.ซม.</p>
                    <p>💰 อัตราคำนวณ: ฿${priceRate.toFixed(2)} / ตร.ซม.</p>
                    <p>💵 ราคาคำนวณ: ฿${calculatedPrice.toFixed(2)}</p>
                    <p><small>⚠️ ราคาที่ตั้งไว้อาจแตกต่างจากราคาคำนวณ</small></p>
                `;
            } else {
                document.getElementById('price-info').style.display = 'none';
            }
        }

        // ==================== ฟังก์ชันโหลดข้อมูลตัวอย่าง ====================
        function loadSampleData() {
            usingSampleData = true;
            
            // ตรวจสอบว่ามี productId หรือไม่
            if (!productId) {
                showMessage('ไม่พบรหัสสินค้า', 'error');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }

            const product = getSampleProductById(productId);
            
            if (!product) {
                showMessage('ไม่พบสินค้าที่ต้องการแก้ไข (โหมดตัวอย่าง)', 'error');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }

            // โหลด categories
            const categories = getSampleCategories();
            const categorySelect = document.getElementById('product_category');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.prod_role_id;
                option.textContent = cat.prod_role_name;
                if (cat.prod_role_id === product.prod_role_id) {
                    option.selected = true;
                }
                categorySelect.appendChild(option);
            });

            // โหลด shapes
            const shapes = getSampleShapes();
            const shapeSelect = document.getElementById('product_shape');
            shapes.forEach(shape => {
                const option = document.createElement('option');
                option.value = shape.shape_id;
                option.textContent = shape.shape_name;
                if (shape.shape_id === product.shape_id) {
                    option.selected = true;
                }
                shapeSelect.appendChild(option);
            });

            // แสดงข้อมูลสินค้า
            document.getElementById('product_id').value = product.products_id;
            document.getElementById('product_name').value = product.products_name || '';
            document.getElementById('product_size').value = product.size || '';
            document.getElementById('product_price').value = product.products_price || 0;
            document.getElementById('product_stock').value = product.prod_stock || 0;

            // แสดงรูปภาพ
            if (product.prod_img) {
                document.getElementById('current-image-container').style.display = 'block';
                
                let filename = product.prod_img;
                if (filename.includes('/')) {
                    filename = filename.split('/').pop();
                }
                document.getElementById('current-image-filename').innerHTML = 
                    `<i class="fas fa-file-image"></i> ${filename}`;
                
                const imageUrl = getImageUrl(product.prod_img);
                document.getElementById('current-image').src = imageUrl;
            }

            // อัปเดตข้อมูลราคา
            updatePriceInfo(product.size);

            // แสดงข้อความแจ้งเตือน
            showMessage('กำลังใช้ข้อมูลตัวอย่าง (โหมดทดสอบ)', 'warning');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('edit-product-form').style.display = 'block';
        }

        // ==================== ฟังก์ชันหลัก ====================
        async function loadData() {
            if (!productId) {
                showMessage('ไม่พบรหัสสินค้า', 'error');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }

            try {
                document.getElementById('loading').style.display = 'block';
                
                // ลองดึงข้อมูลจาก API
                priceRate = await getPriceRate();
                
                const [categories, shapes, product] = await Promise.all([
                    getCategories().catch(() => null),
                    getShapes().catch(() => null),
                    getProductById(productId).catch(() => null)
                ]);

                // ถ้าดึงข้อมูลไม่ได้ ให้ใช้ข้อมูลตัวอย่าง
                if (!categories || !shapes || !product) {
                    console.log('Using sample data');
                    loadSampleData();
                    return;
                }
                
                document.getElementById('product_id').value = product.products_id;
                document.getElementById('product_name').value = product.products_name || '';
                document.getElementById('product_size').value = product.size || '';
                document.getElementById('product_price').value = product.products_price || 0;
                document.getElementById('product_stock').value = product.prod_stock || 0;
                
                const categorySelect = document.getElementById('product_category');
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.prod_role_id;
                    option.textContent = cat.prod_role_name;
                    if (cat.prod_role_id === product.prod_role_id) {
                        option.selected = true;
                    }
                    categorySelect.appendChild(option);
                });
                
                const shapeSelect = document.getElementById('product_shape');
                shapes.forEach(shape => {
                    const option = document.createElement('option');
                    option.value = shape.shape_id;
                    option.textContent = shape.shape_name;
                    if (shape.shape_id === product.shape_id) {
                        option.selected = true;
                    }
                    shapeSelect.appendChild(option);
                });
                
                if (product.prod_img) {
                    document.getElementById('current-image-container').style.display = 'block';
                    
                    let filename = product.prod_img;
                    if (filename.includes('/')) {
                        filename = filename.split('/').pop();
                    }
                    document.getElementById('current-image-filename').innerHTML = 
                        `<i class="fas fa-file-image"></i> ${filename}`;
                    
                    const imageUrl = getImageUrl(product.prod_img);
                    document.getElementById('current-image').src = imageUrl;
                }
                
                updatePriceInfo(product.size);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('edit-product-form').style.display = 'block';
                
                showMessage('เชื่อมต่อฐานข้อมูลสำเร็จ', 'success');
                
            } catch (error) {
                console.error('Error loading data:', error);
                // ถ้า error ให้ใช้ข้อมูลตัวอย่าง
                loadSampleData();
            }
        }

        // ==================== Event Listeners ====================
        document.getElementById('edit-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('product_name').value.trim();
            const category = document.getElementById('product_category').value;
            const shape = document.getElementById('product_shape').value;
            const size = document.getElementById('product_size').value.trim();
            const price = parseFloat(document.getElementById('product_price').value);
            const stock = parseInt(document.getElementById('product_stock').value);
            
            if (!name) {
                showMessage('กรุณากรอกชื่อสินค้า', 'error');
                return;
            }
            
            if (!category) {
                showMessage('กรุณาเลือกประเภทตรายาง', 'error');
                return;
            }
            
            if (!shape) {
                showMessage('กรุณาเลือกรูปร่างตรายาง', 'error');
                return;
            }
            
            if (!size) {
                showMessage('กรุณากรอกขนาดตรายาง', 'error');
                return;
            }
            
            if (price <= 0) {
                showMessage('กรุณากรอกราคาที่ถูกต้อง', 'error');
                return;
            }
            
            if (stock < 0) {
                showMessage('กรุณากรอกจำนวนสต็อกที่ถูกต้อง', 'error');
                return;
            }
            
            const submitBtn = e.target.querySelector('.btn-save');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
            submitBtn.disabled = true;
            
            try {
                if (usingSampleData) {
                    // ถ้าเป็นโหมดตัวอย่าง ให้จำลองการบันทึก
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    showMessage('บันทึกการเปลี่ยนแปลงสำเร็จ (โหมดตัวอย่าง)', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                    return;
                }

                const data = {
                    products_name: name,
                    prod_role_id: parseInt(category),
                    shape_id: parseInt(shape),
                    size: size,
                    products_price: price,
                    prod_stock: stock
                };
                
                await updateProduct(productId, data);
                
                showMessage('บันทึกการเปลี่ยนแปลงสำเร็จ!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
            } catch (error) {
                console.error('Error updating product:', error);
                showMessage('เกิดข้อผิดพลาด: ' + error.message, 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        document.getElementById('product_size').addEventListener('input', (e) => {
            updatePriceInfo(e.target.value);
        });

        document.getElementById('product-image').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || 'เลือกรูปภาพใหม่...';
            document.getElementById('file-name').textContent = fileName;
            
            const preview = document.getElementById('image-preview');
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // ==================== Modal Functions ====================
        window.previewImage = function(src) {
            document.getElementById('imageModal').style.display = 'flex';
            document.getElementById('modalImage').src = src;
        };

        window.closeModal = function() {
            document.getElementById('imageModal').style.display = 'none';
        };

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        window.goBack = function() {
            window.location.href = 'index.html';
        };

        // เริ่มต้นการทำงาน
        loadData();
    </script>
</body>
</html>
