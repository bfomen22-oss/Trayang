<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Web - Editable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <div id="app" class="max-w-xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden mt-10 border border-slate-200">
        <div class="bg-slate-800 p-6 flex justify-between items-center text-white">
            <h1 class="text-xl font-bold tracking-tight">Admin Dashboard</h1>
            <button id="editBtn" class="bg-blue-500 hover:bg-blue-600 px-5 py-2 rounded-full text-sm font-semibold transition-all">
                ⚙️ แก้ไข
            </button>
        </div>

        <div class="p-6 space-y-6">
            <div id="image-section" class="relative group">
                <div class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">Cover Image</div>
                <img id="display-image" src="https://via.placeholder.com/600x400?text=Loading..." 
                     class="w-full h-64 object-cover rounded-2xl shadow-inner border border-slate-100">
                
                <div id="file-input-container" class="hidden mt-3">
                    <label class="block text-sm font-medium text-slate-700 mb-1">เปลี่ยนรูปภาพ:</label>
                    <input type="file" id="file-input" accept="image/*" 
                           class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                </div>
            </div>

            <hr class="border-slate-100">

            <div id="text-display" class="space-y-3">
                <h2 id="display-title" class="text-3xl font-extrabold text-slate-900 leading-tight">กำลังโหลดหัวข้อ...</h2>
                <p id="display-content" class="text-slate-600 leading-relaxed whitespace-pre-wrap text-lg">กำลังโหลดเนื้อหา...</p>
            </div>

            <div id="text-edit" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">หัวข้อ</label>
                    <input type="text" id="input-title" class="w-full border-2 border-slate-200 p-3 rounded-xl focus:border-blue-500 outline-none transition text-xl font-bold">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">เนื้อหา</label>
                    <textarea id="input-content" class="w-full border-2 border-slate-200 p-3 rounded-xl h-44 focus:border-blue-500 outline-none transition leading-relaxed"></textarea>
                </div>
                <button id="saveBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 transition-all active:scale-[0.98]">
                    💾 บันทึกการเปลี่ยนแปลง
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://plpaoldrfhzbktyxfuwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBscGFvbGRyZmh6Ymt0eXhmdXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDE1MTksImV4cCI6MjA4ODQxNzUxOX0.5eA3bX9pE4fmC1LcSsRqbZca4RDfScwwe7SoQSoOrIg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isEditing = false;
        let currentPostId = null;

        // Elements
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');
        const fileInput = document.getElementById('file-input');
        const displayImage = document.getElementById('display-image');
        const textDisplay = document.getElementById('text-display');
        const textEdit = document.getElementById('text-edit');
        const fileInputContainer = document.getElementById('file-input-container');

        // --- 2. LOAD DATA ---
        async function loadData() {
            try {
                const { data, error } = await supabaseClient.from('posts').select('*').limit(1).single();
                if (error) throw error;
                
                if (data) {
                    currentPostId = data.id;
                    document.getElementById('display-title').innerText = data.title;
                    document.getElementById('display-content').innerText = data.content;
                    displayImage.src = data.image_url || 'https://via.placeholder.com/600x400?text=No+Image';
                    
                    document.getElementById('input-title').value = data.title;
                    document.getElementById('input-content').value = data.content;
                }
            } catch (err) {
                console.error("Error loading data:", err.message);
                document.getElementById('display-title').innerText = "เชื่อมต่อฐานข้อมูลไม่ได้";
            }
        }

        // --- 3. PREVIEW IMAGE IMMEDIATELY ---
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    displayImage.src = e.target.result; // เปลี่ยนรูปบนจอทันที (Preview)
                }
                reader.readAsDataURL(file);
            }
        });

        // --- 4. TOGGLE EDIT MODE ---
        editBtn.addEventListener('click', () => {
            isEditing = !isEditing;
            textDisplay.classList.toggle('hidden', isEditing);
            textEdit.classList.toggle('hidden', !isEditing);
            fileInputContainer.classList.toggle('hidden', !isEditing);
            editBtn.innerText = isEditing ? '❌ ยกเลิก' : '⚙️ แก้ไข';
            editBtn.classList.toggle('bg-red-500', isEditing);
            editBtn.classList.toggle('bg-blue-500', !isEditing);
        });

        // --- 5. SAVE DATA & UPLOAD IMAGE ---
        saveBtn.addEventListener('click', async () => {
            const title = document.getElementById('input-title').value;
            const content = document.getElementById('input-content').value;
            let finalImageUrl = displayImage.src;

            saveBtn.disabled = true;
            saveBtn.innerText = "⏳ กำลังบันทึกข้อมูล...";

            try {
                // อัปโหลดรูป (ถ้ามีการเลือกไฟล์ใหม่)
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}.${fileExt}`;
                    
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('images') // ต้องสร้าง Bucket ชื่อ images ใน Supabase
                        .upload(fileName, file);

                    if (uploadError) throw uploadError;

                    const { data: publicUrl } = supabaseClient.storage.from('images').getPublicUrl(fileName);
                    finalImageUrl = publicUrl.publicUrl;
                }

                // อัปเดต Database
                const { error: dbError } = await supabaseClient
                    .from('posts')
                    .update({ title, content, image_url: finalImageUrl })
                    .eq('id', currentPostId);

                if (dbError) throw dbError;

                alert("✅ บันทึกข้อมูลสำเร็จ!");
                location.reload();

            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
                saveBtn.disabled = false;
                saveBtn.innerText = "💾 บันทึกการเปลี่ยนแปลง";
            }
        });

        // Start
        loadData();
    </script>
</body>
</html>
