<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div id="app" class="max-w-xl mx-auto bg-white rounded-2xl shadow-md overflow-hidden mt-10 p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">My Dashboard</h1>
            <button id="editBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition">
                ⚙️ แก้ไขข้อมูล
            </button>
        </div>

        <div id="image-container" class="relative group">
            <img id="display-image" src="https://via.placeholder.com/400x200?text=Select+Image" 
                 class="w-full h-52 object-cover rounded-xl border-2 border-dashed border-gray-300">
            
            <input type="file" id="file-input" accept="image/*" class="hidden mt-2 text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>

            <div id="text-display">
                <h2 id="display-title" class="text-2xl font-bold text-gray-900">หัวข้อ</h2>
                <p id="display-content" class="mt-2 text-gray-600 whitespace-pre-wrap">เนื้อหา...</p>
            </div>

            <div id="text-edit" class="hidden space-y-3">
                <input type="text" id="input-title" class="w-full border p-2 rounded-lg font-bold">
                <textarea id="input-content" class="w-full border p-2 rounded-lg h-32"></textarea>
                <button id="saveBtn" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">
                    💾 บันทึกการเปลี่ยนแปลง
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://plpaoldrfhzbktyxfuwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBscGFvbGRyZmh6Ymt0eXhmdXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDE1MTksImV4cCI6MjA4ODQxNzUxOX0.5eA3bX9pE4fmC1LcSsRqbZca4RDfScwwe7SoQSoOrIg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let isEditing = false;
        let currentPostId = null;
        
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');
        const fileInput = document.getElementById('file-input');
        const displayImage = document.getElementById('display-image')
        
        // --- ฟังก์ชันแสดงรูป Preview ทันทีที่เลือกไฟล์ ---
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                // ใช้ FileReader อ่านไฟล์ในเครื่องมาโชว์ที่หน้าเว็บก่อน
                const reader = new FileReader();
                reader.onload = function(e) {
                    displayImage.src = e.target.result; // เปลี่ยนรูปที่โชว์เป็นรูปที่เราเลือก
                    displayImage.classList.remove('border-dashed'); // ปรับดีไซน์ให้สวยขึ้น
                }
                reader.readAsDataURL(file);
            }
        });

        async function saveData() {
        const title = document.getElementById('input-title').value;
        const content = document.getElementById('input-content').value;
        let finalUrl = displayImage.src; // ใช้รูปปัจจุบันที่โชว์อยู่

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "กำลังอัปโหลดรูปและบันทึก...";

        // ถ้ามีการเลือกไฟล์ใหม่ (เช็คว่าเป็นไฟล์จากเครื่อง ไม่ใช่ URL เดิม)
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`; // ตั้งชื่อไฟล์ใหม่กันซ้ำ

            // 1. อัปโหลดไฟล์ไปที่ Supabase Storage
            const { data: uploadData, error: uploadError } = await supabaseClient.storage
                .from('images') // ชื่อ Bucket ต้องตรงกับใน Supabase
                .upload(fileName, file);

            if (uploadError) {
                alert("อัปโหลดรูปไม่สำเร็จ: " + uploadError.message);
                saveBtn.disabled = false;
                return;
            }

            // 2. ดึง URL จริงของรูปที่เพิ่งอัปโหลด
            const { data: publicUrl } = supabaseClient.storage
                .from('images')
                .getPublicUrl(fileName);
            
            finalUrl = publicUrl.publicUrl;
        }
        
        // สลับโหมดแก้ไข
        editBtn.addEventListener('click', () => {
            isEditing = !isEditing;
            document.getElementById('text-display').classList.toggle('hidden', isEditing);
            document.getElementById('text-edit').classList.toggle('hidden', !isEditing);
            fileInput.classList.toggle('hidden', !isEditing);
            editBtn.innerText = isEditing ? '❌ ยกเลิก' : '⚙️ แก้ไขข้อมูล';
        });
        
        async function loadData() {
            const { data, error } = await supabaseClient.from('posts').select('*').limit(1).single();
            if (data) {
                currentPostId = data.id;
                document.getElementById('display-title').innerText = data.title;
                document.getElementById('display-content').innerText = data.content;
                displayImage.src = data.image_url || 'https://via.placeholder.com/400';
                document.getElementById('input-title').value = data.title;
                document.getElementById('input-content').value = data.content;
            }
        }
        
        saveBtn.addEventListener('click', async () => {
            const title = document.getElementById('input-title').value;
            const content = document.getElementById('input-content').value;
            let finalImageUrl = displayImage.src;
        
            saveBtn.disabled = true;
            saveBtn.innerText = "กำลังบันทึก...";
        
            // ถ้ามีการเลือกไฟล์ใหม่ (เช็คว่าไม่ใช่ลิงก์เดิม)
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileName = `${Date.now()}-${file.name}`;
                
                // อัปโหลดไป Storage
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('images') // มั่นใจว่าใน Supabase สร้าง Bucket ชื่อ images และเป็น Public แล้ว
                    .upload(fileName, file);
        
                if (uploadError) {
                    alert("อัปโหลดรูปไม่สำเร็จ: " + uploadError.message);
                    saveBtn.disabled = false;
                    return;
                }
        
                const { data: publicUrl } = supabaseClient.storage.from('images').getPublicUrl(fileName);
                finalImageUrl = publicUrl.publicUrl;
            }
        
            // อัปเดต Database
            const { error: dbError } = await supabaseClient
            .from('posts')
            .update({ 
                title: title, 
                content: content, 
                image_url: finalUrl 
            })
            .eq('id', currentPostId);

        if (!dbError) {
            alert("บันทึกและอัปโหลดรูปเรียบร้อย!");
            location.reload();
        } else {
            alert("บันทึกข้อความไม่สำเร็จ: " + dbError.message);
            saveBtn.disabled = false;
        }
    }
    
    // อย่าลืมผูกฟังก์ชัน saveData กับปุ่ม Save ของคุณด้วยครับ
    document.getElementById('saveBtn').onclick = saveData;
        
        loadData();
    </script>
</body>
</html>
