<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าแรก | ร้านตรายางออนไลน์</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/img/LG.jpg">
    <style>
        /* คัดลอก CSS จาก index.php ทั้งหมดมาวางไว้ที่นี่ */
        /* (ใส่ CSS เดิมทั้งหมดที่อยู่ใน <style> ของ index.php) */
        .welcome-section {
            padding: 3rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-bottom: 2px solid #e50914;
        }
        
        .welcome-section h1 {
            color: #e50914;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .welcome-section p {
            color: #bbb;
            max-width: 800px;
            margin: 0 auto 1.5rem;
        }
        
        .search-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 1rem;
            height: 44px;
            box-sizing: border-box;
            line-height: 1.2;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #e50914;
        }
        
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .category-btn {
            padding: 8px 16px;
            background: #222;
            border: 1px solid #444;
            color: #bbb;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            line-height: 1.2;
            height: 36px;
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .category-btn:hover {
            background: #333;
            color: #fff;
        }
        
        .category-btn.active {
            background: #e50914;
            color: white;
            border-color: #e50914;
        }
        
        .filter-info {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            background: rgba(229, 9, 20, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-info span {
            color: #e50914;
            font-weight: 500;
        }
        
        .main-products-section {
            padding: 40px 80px;
        }
        
        @media (max-width: 768px) {
            .main-products-section {
                padding: 30px 20px;
            }
        }
        
        .main-products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .main-products-header h2 {
            color: #e50914;
            font-size: 24px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .products-count {
            color: #bbb;
            font-size: 0.9rem;
        }
        
        .btn-main {
            padding: 10px 20px;
            border-radius: 25px;
            background: #e50914;
            color: white;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            line-height: 1.2;
            height: 44px;
            min-width: 100px;
            white-space: nowrap;
            box-sizing: border-box;
            vertical-align: middle;
        }
        
        .btn-main i {
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-main:hover {
            background: #b20710;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
        }
        
        .btn-edit {
            background: #2196F3;
            width: 100%;
            margin-top: 8px;
        }
        
        .btn-edit:hover {
            background: #0b7dda;
        }
        
        .btn-out-of-stock {
            background: #666;
            width: 100%;
            margin-top: 8px;
            cursor: not-allowed;
        }
        
        .btn-out-of-stock:hover {
            background: #666;
            transform: none;
            box-shadow: none;
        }
        
        .main-product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .main-product-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #333;
            position: relative;
        }
        
        .main-product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.6);
            border-color: #e50914;
        }
        
        .main-product-card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #000;
        }
        
        .main-product-card-info {
            padding: 15px;
        }
        
        .main-product-card-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #fff;
            line-height: 1.4;
        }
        
        .product-type {
            display: inline-block;
            background: rgba(229, 9, 20, 0.1);
            color: #e50914;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .product-size {
            color: #bbb;
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .product-details {
            margin: 10px 0;
            padding: 8px 0;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .detail-label {
            color: #888;
        }
        
        .detail-value {
            color: #fff;
            font-weight: 500;
        }
        
        .price {
            color: #e50914;
            font-weight: bold;
            font-size: 24px;
            margin: 10px 0 5px;
            line-height: 1.2;
        }
        
        .price-note {
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .admin-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff9800;
            color: #000;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #e50914;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #888;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .empty-state p {
            margin-bottom: 1rem;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }
        
        .page-btn {
            padding: 6px 12px;
            background: #222;
            border: 1px solid #444;
            color: #bbb;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            line-height: 1.2;
            height: 32px;
            min-width: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        
        .page-btn:hover {
            background: #333;
            color: #fff;
        }
        
        .page-btn.active {
            background: #e50914;
            color: white;
            border-color: #e50914;
        }
        
        .page-info {
            color: #bbb;
            font-size: 0.85rem;
            margin-left: 10px;
            line-height: 1.2;
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            min-width: 300px;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            line-height: 1.4;
        }
        
        .alert-success {
            color: #4CAF50;
            border-left: 4px solid #4CAF50;
        }
        
        .alert-error {
            color: #f44336;
            border-left: 4px solid #f44336;
        }

        .alert-info {
            color: #2196F3;
            border-left: 4px solid #2196F3;
        }

        .stock-info {
            margin: 8px 0;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        
        .in-stock {
            color: #4CAF50;
        }
        
        .low-stock {
            color: #ff9800;
        }
        
        .out-of-stock {
            color: #f44336;
        }
        
        .footer {
            background: #111;
            padding: 2rem;
            text-align: center;
            margin-top: 3rem;
            border-top: 1px solid #333;
        }
        
        .footer p {
            color: #888;
            margin: 0.5rem 0;
            line-height: 1.5;
        }
        
        .db-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-top: 10px;
            line-height: 1.2;
        }
        
        .db-connected {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        
        .db-disconnected {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        @media (max-width: 768px) {
            .search-box {
                flex-direction: column;
                gap: 10px;
            }
            
            .search-input {
                width: 100%;
            }
            
            .search-box .btn-main {
                width: 100%;
                height: 44px;
                font-size: 16px;
            }
            
            .category-btn {
                padding: 6px 12px;
                font-size: 0.85rem;
                height: 32px;
            }
            
            .main-products-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .main-products-header h2 {
                font-size: 20px;
            }
            
            .main-product-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 15px;
            }
            
            .alert {
                min-width: 250px;
                max-width: 90%;
                padding: 12px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .welcome-section {
                padding: 2rem 1rem;
            }
            
            .welcome-section h1 {
                font-size: 2rem;
            }
            
            .main-product-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .main-product-card-img {
                height: 180px;
            }
            
            .pagination {
                gap: 5px;
            }
            
            .page-btn {
                padding: 4px 8px;
                font-size: 0.8rem;
                height: 28px;
                min-width: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Alert Messages -->
    <div id="alert-container"></div>

    <!-- Welcome Section -->
    <div class="welcome-section">
        <h1>ยินดีต้อนรับสู่ร้านตรายางออนไลน์</h1>
        <p>ร้านตรายางคุณภาพดี ราคายุติธรรม พร้อมบริการจัดส่งถึงที่</p>
        <div class="db-status db-connected" id="db-status" style="display: none;">
            <i class="fas fa-check-circle"></i> เชื่อมต่อ API สำเร็จ
        </div>
        <div class="db-status db-disconnected" id="db-status-error" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> กำลังเชื่อมต่อ...
        </div>
    </div>

    <!-- Search Section -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" 
                   id="searchInput" 
                   class="search-input" 
                   placeholder="ค้นหาตรายาง... (ชื่อ, ขนาด)"
                   autocomplete="off">
            <button class="btn-main" onclick="searchProduct()">
                <i class="fas fa-search"></i> ค้นหา
            </button>
            <button class="btn-main" onclick="clearAllFilters()" style="background: #666; display: none;" id="clearBtn">
                <i class="fas fa-times"></i> ล้าง
            </button>
        </div>
        
        <!-- Category Filter -->
        <div class="category-filter" id="categoryFilter">
            <button class="category-btn active" data-category="0">
                <i class="fas fa-th-large"></i> ทั้งหมด
            </button>
        </div>
        
        <!-- Filter Info -->
        <div class="filter-info" id="filterInfo" style="display: none;"></div>
    </div>

    <!-- Products Section -->
    <section class="main-products-section">
        <div class="main-products-header">
            <h2 id="sectionTitle"><i class="fa-solid fa-stamp"></i> สินค้าทั้งหมด</h2>
            <div class="products-count" id="products-count">กำลังโหลด...</div>
        </div>
        
        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p>กำลังโหลดสินค้า...</p>
        </div>
        
        <div class="main-product-grid" id="products-grid" style="display: none;"></div>
        
        <div class="empty-state" id="empty-state" style="display: none;">
            <i class="fas fa-box-open"></i>
            <h3>ไม่พบสินค้า</h3>
            <p id="empty-message"></p>
            <button class="btn-main" onclick="clearAllFilters()" style="margin-top: 1rem;">
                <i class="fas fa-times"></i> ล้างตัวกรอง
            </button>
        </div>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination" style="display: none;"></div>
    </section>

    <!-- Footer -->
    <div class="footer">
        <p>ร้านตรายางออนไลน์ © <span id="currentYear"></span></p>
        <p>บริการจัดส่งทั่วประเทศ</p>
    </div>

    <script type="module">
        // Import functions
        import { 
            getCategories, 
            getProducts, 
            countProducts,
            getImageUrl,
            parseSize,
            supabaseRequest
        } from './api/supabase.js';

        // State
        let currentCategory = 0;
        let currentSearch = '';
        let currentPage = 1;
        let totalPages = 1;
        let totalProducts = 0;
        const perPage = 12;
        let categories = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('currentYear').textContent = new Date().getFullYear();
            
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            currentCategory = parseInt(urlParams.get('category')) || 0;
            currentSearch = urlParams.get('search') || '';
            currentPage = parseInt(urlParams.get('page')) || 1;
            
            // Set search input value
            if (currentSearch) {
                document.getElementById('searchInput').value = currentSearch;
                document.getElementById('clearBtn').style.display = 'flex';
            }
            
            if (currentCategory > 0 || currentSearch) {
                document.getElementById('clearBtn').style.display = 'flex';
            }
            
            try {
                await loadCategories();
                await loadProducts();
                updateFilterInfo();
                document.getElementById('db-status').style.display = 'inline-block';
                document.getElementById('db-status-error').style.display = 'none';
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('db-status').style.display = 'none';
                document.getElementById('db-status-error').style.display = 'inline-block';
                document.getElementById('db-status-error').innerHTML = '<i class="fas fa-exclamation-triangle"></i> ไม่สามารถเชื่อมต่อ API ได้';
                showAlert('ไม่สามารถเชื่อมต่อกับ API ได้', 'error');
                loadSampleData();
            }
        });

        // Load categories
        async function loadCategories() {
            try {
                categories = await getCategories();
                
                const container = document.getElementById('categoryFilter');
                // Clear existing except "ทั้งหมด"
                container.innerHTML = '';
                
                // Add "All" button
                const allBtn = document.createElement('button');
                allBtn.className = `category-btn ${currentCategory === 0 ? 'active' : ''}`;
                allBtn.dataset.category = '0';
                allBtn.onclick = () => filterProducts(0);
                allBtn.innerHTML = '<i class="fas fa-th-large"></i> ทั้งหมด';
                container.appendChild(allBtn);
                
                // Add category buttons
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = `category-btn ${currentCategory === cat.prod_role_id ? 'active' : ''}`;
                    btn.dataset.category = cat.prod_role_id;
                    btn.onclick = () => filterProducts(cat.prod_role_id);
                    btn.textContent = cat.prod_role_name;
                    container.appendChild(btn);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
                throw error;
            }
        }

        // Load products
        async function loadProducts() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('products-grid').style.display = 'none';
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('pagination').style.display = 'none';
                
                // Get products
                const products = await getProducts({
                    category: currentCategory,
                    search: currentSearch,
                    page: currentPage,
                    limit: perPage
                });
                
                // Get total count
                totalProducts = await countProducts({
                    category: currentCategory,
                    search: currentSearch
                });
                
                totalPages = Math.ceil(totalProducts / perPage);
                
                // Update products count display
                if (totalProducts > 0) {
                    const start = (currentPage - 1) * perPage + 1;
                    const end = Math.min(currentPage * perPage, totalProducts);
                    document.getElementById('products-count').textContent = 
                        `แสดง ${start}-${end} จาก ${totalProducts} รายการ`;
                } else {
                    document.getElementById('products-count').textContent = 'ไม่พบสินค้า';
                }
                
                // Update section title
                updateSectionTitle();
                
                if (products.length > 0) {
                    renderProducts(products);
                    renderPagination();
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('products-grid').style.display = 'grid';
                } else {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('empty-state').style.display = 'block';
                    document.getElementById('empty-message').textContent = getEmptyMessage();
                }
                
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('loading').style.display = 'none';
                showAlert('เกิดข้อผิดพลาดในการโหลดสินค้า', 'error');
            }
        }

        // Render products
        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            products.forEach(product => {
                const productName = product.products_name || '';
                const size = product.size || '';
                const typeName = product.products_role?.prod_role_name || 'ไม่ระบุ';
                const shapeName = product.shapes?.shape_name || 'ไม่ระบุ';
                const typeIcon = typeName.includes('หมึก') ? 'fas fa-fill-drip' : 'fas fa-stamp';
                
                const price = parseFloat(product.products_price || 0);
                const formattedPrice = price.toFixed(2);
                
                const stock = parseInt(product.prod_stock || 0);
                let stockClass = 'in-stock';
                let stockText = 'มีสินค้า';
                
                if (stock <= 0) {
                    stockClass = 'out-of-stock';
                    stockText = 'สินค้าหมด';
                } else if (stock <= 5) {
                    stockClass = 'low-stock';
                    stockText = `เหลือ ${stock} ชิ้น`;
                } else {
                    stockText = `มีสินค้า ${stock} ชิ้น`;
                }
                
                const sizeData = parseSize(size);
                const width = sizeData.width;
                const length = sizeData.length;
                const area = width * length;
                
                const imageUrl = getImageUrl(product.prod_img || '');
                
                const card = document.createElement('div');
                card.className = 'main-product-card';
                card.innerHTML = `
                    <div class="admin-badge">
                        <i class="fas fa-crown"></i> ADMIN
                    </div>
                    
                    <img src="${imageUrl}" 
                         alt="${productName}" 
                         class="main-product-card-img"
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/300x200/1a1a1a/e50914?text=Image+Not+Found'">
                    
                    <div class="main-product-card-info">
                        <div class="product-type">
                            <i class="${typeIcon}"></i> ${typeName} | <i class="fas fa-shape"></i> ${shapeName}
                        </div>
                        <h3>${productName}</h3>
                        <div class="product-size">
                            <i class="fas fa-ruler"></i> ขนาด: ${size}
                        </div>
                        
                        <div class="product-details">
                            ${width > 0 && length > 0 ? `
                                <div class="detail-row">
                                    <span class="detail-label">กว้าง:</span>
                                    <span class="detail-value">${width} ซม.</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">ยาว:</span>
                                    <span class="detail-value">${length} ซม.</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">พื้นที่:</span>
                                    <span class="detail-value">${area.toFixed(2)} ตร.ซม.</span>
                                </div>
                            ` : `
                                <div class="detail-row">
                                    <span class="detail-label">ขนาด:</span>
                                    <span class="detail-value">${size}</span>
                                </div>
                            `}
                            <div class="detail-row">
                                <span class="detail-label">รหัสสินค้า:</span>
                                <span class="detail-value">#${product.products_id}</span>
                            </div>
                        </div>
                        
                        <div class="price">฿${formattedPrice}</div>
                        ${width > 0 && length > 0 ? `
                            <div class="price-note">
                                (${width} x ${length} = ${area.toFixed(2)} ตร.ซม.)
                            </div>
                        ` : ''}
                        
                        <div class="stock-info ${stockClass}">
                            <i class="fas fa-box"></i> ${stockText}
                        </div>
                        
                        <button class="btn-main btn-edit" onclick="editProduct(${product.products_id})">
                            <i class="fas fa-edit"></i> แก้ไขสินค้า
                        </button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Render pagination
        function renderPagination() {
            if (totalPages <= 1) {
                document.getElementById('pagination').style.display = 'none';
                return;
            }
            
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            container.style.display = 'flex';
            
            // Previous button
            if (currentPage > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'page-btn';
                prevBtn.onclick = () => changePage(currentPage - 1);
                prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
                container.appendChild(prevBtn);
            }
            
            // Page buttons
            const maxPagesToShow = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxPagesToShow / 2));
            let endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);
            
            if (endPage - startPage + 1 < maxPagesToShow) {
                startPage = Math.max(1, endPage - maxPagesToShow + 1);
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.onclick = () => changePage(i);
                pageBtn.textContent = i;
                container.appendChild(pageBtn);
            }
            
            // Next button
            if (currentPage < totalPages) {
                const nextBtn = document.createElement('button');
                nextBtn.className = 'page-btn';
                nextBtn.onclick = () => changePage(currentPage + 1);
                nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
                container.appendChild(nextBtn);
            }
            
            // Page info
            const pageInfo = document.createElement('div');
            pageInfo.className = 'page-info';
            pageInfo.textContent = `หน้า ${currentPage} จาก ${totalPages}`;
            container.appendChild(pageInfo);
        }

        // Update section title
        function updateSectionTitle() {
            const title = document.getElementById('sectionTitle');
            if (currentSearch) {
                title.innerHTML = `<i class="fa-solid fa-stamp"></i> ผลการค้นหา`;
            } else if (currentCategory > 0) {
                const category = categories.find(c => c.prod_role_id === currentCategory);
                title.innerHTML = `<i class="fa-solid fa-stamp"></i> สินค้าในหมวดหมู่: ${category?.prod_role_name || ''}`;
            } else {
                title.innerHTML = `<i class="fa-solid fa-stamp"></i> สินค้าทั้งหมด`;
            }
        }

        // Update filter info
        function updateFilterInfo() {
            const filterInfo = document.getElementById('filterInfo');
            if (currentSearch || currentCategory > 0) {
                filterInfo.style.display = 'flex';
                let html = '<div>';
                
                if (currentSearch) {
                    html += `<span><i class="fas fa-search"></i> ค้นหา: "${currentSearch}"</span>`;
                }
                
                if (currentCategory > 0) {
                    const category = categories.find(c => c.prod_role_id === currentCategory);
                    if (currentSearch) html += ' &nbsp;|&nbsp; ';
                    html += `<span><i class="fas fa-filter"></i> ประเภท: ${category?.prod_role_name || ''}</span>`;
                }
                
                html += '</div>';
                filterInfo.innerHTML = html;
            } else {
                filterInfo.style.display = 'none';
            }
        }

        // Get empty message
        function getEmptyMessage() {
            if (currentSearch) {
                return `ไม่พบสินค้าสำหรับ "${currentSearch}"`;
            } else if (currentCategory > 0) {
                return 'ไม่มีสินค้าในหมวดหมู่นี้';
            } else {
                return 'ยังไม่มีสินค้าในขณะนี้';
            }
        }

        // Navigation functions
        window.searchProduct = function() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const url = new URL(window.location.href);
            
            if (searchTerm) {
                url.searchParams.set('search', searchTerm);
            } else {
                url.searchParams.delete('search');
            }
            
            url.searchParams.set('category', currentCategory);
            url.searchParams.set('page', '1');
            
            window.location.href = url.toString();
        };

        window.filterProducts = function(categoryId) {
            const url = new URL(window.location.href);
            
            if (categoryId > 0) {
                url.searchParams.set('category', categoryId);
            } else {
                url.searchParams.delete('category');
            }
            
            url.searchParams.set('page', '1');
            
            // Keep search if exists
            if (currentSearch) {
                url.searchParams.set('search', currentSearch);
            }
            
            window.location.href = url.toString();
        };

        window.changePage = function(pageNum) {
            const url = new URL(window.location.href);
            url.searchParams.set('page', pageNum);
            
            if (currentCategory > 0) {
                url.searchParams.set('category', currentCategory);
            }
            
            if (currentSearch) {
                url.searchParams.set('search', currentSearch);
            }
            
            window.location.href = url.toString();
        };

        window.clearAllFilters = function() {
            window.location.href = window.location.pathname;
        };

        window.editProduct = function(productId) {
            window.location.href = `admin/edit.html?id=${productId}`;
        };

        // Show alert
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alert-container');
            const alertId = 'alert-' + Date.now();
            
            const alertClass = type === 'success' ? 'alert-success' : 
                              type === 'error' ? 'alert-error' : 'alert-info';
            
            const alertHtml = `
                <div id="${alertId}" class="alert ${alertClass}">
                    ${message}
                    <button onclick="document.getElementById('${alertId}').remove()" 
                            style="background:none;border:none;color:inherit;margin-left:10px;cursor:pointer;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            
            alertContainer.insertAdjacentHTML('beforeend', alertHtml);
            
            setTimeout(() => {
                const alertElement = document.getElementById(alertId);
                if (alertElement) {
                    alertElement.remove();
                }
            }, 5000);
        }

        // Load sample data for fallback
        function loadSampleData() {
            const sampleCategories = [
                { prod_role_id: 1, prod_role_name: 'ด้ามธรรมดา' },
                { prod_role_id: 2, prod_role_name: 'ด้ามหมึกในตัว' }
            ];
            
            categories = sampleCategories;
            
            const container = document.getElementById('categoryFilter');
            container.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.className = `category-btn ${currentCategory === 0 ? 'active' : ''}`;
            allBtn.dataset.category = '0';
            allBtn.onclick = () => filterProducts(0);
            allBtn.innerHTML = '<i class="fas fa-th-large"></i> ทั้งหมด';
            container.appendChild(allBtn);
            
            sampleCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${currentCategory === cat.prod_role_id ? 'active' : ''}`;
                btn.dataset.category = cat.prod_role_id;
                btn.onclick = () => filterProducts(cat.prod_role_id);
                btn.textContent = cat.prod_role_name;
                container.appendChild(btn);
            });
            
            // Sample products
            const sampleProducts = [
                {
                    products_id: 1,
                    products_name: 'ตรายางบริษัท AAA',
                    size: '3x5 ซม.',
                    products_price: 250.00,
                    prod_role_id: 1,
                    products_role: { prod_role_name: 'ด้ามธรรมดา' },
                    shapes: { shape_name: 'สี่เหลี่ยม' },
                    prod_img: 'sample_stamp_1.png',
                    prod_stock: 10
                },
                {
                    products_id: 2,
                    products_name: 'ตรายางชื่อบุคคล',
                    size: '2x5 ซม.',
                    products_price: 150.00,
                    prod_role_id: 2,
                    products_role: { prod_role_name: 'ด้ามหมึกในตัว' },
                    shapes: { shape_name: 'สี่เหลี่ยมมน' },
                    prod_img: 'sample_stamp_2.png',
                    prod_stock: 5
                }
            ];
            
            // Filter sample products
            let filtered = [...sampleProducts];
            
            if (currentCategory > 0) {
                filtered = filtered.filter(p => p.prod_role_id === currentCategory);
            }
            
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(p => 
                    p.products_name.toLowerCase().includes(searchLower) ||
                    p.size.toLowerCase().includes(searchLower)
                );
            }
            
            totalProducts = filtered.length;
            totalPages = Math.ceil(totalProducts / perPage);
            
            const start = (currentPage - 1) * perPage;
            const pagedProducts = filtered.slice(start, start + perPage);
            
            document.getElementById('products-count').textContent = 
                totalProducts > 0 ? 
                `แสดง ${start + 1}-${Math.min(start + perPage, totalProducts)} จาก ${totalProducts} รายการ (โหมดตัวอย่าง)` :
                'ไม่พบสินค้า (โหมดตัวอย่าง)';
            
            document.getElementById('loading').style.display = 'none';
            
            if (pagedProducts.length > 0) {
                renderProducts(pagedProducts);
                renderPagination();
                document.getElementById('products-grid').style.display = 'grid';
            } else {
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('empty-message').textContent = getEmptyMessage() + ' (โหมดตัวอย่าง)';
            }
        }

        // Enter key on search
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchProduct();
            }
        });
    </script>
</body>
</html>
